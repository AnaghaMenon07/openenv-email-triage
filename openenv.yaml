name: email-triage-env
description: Context-aware email triage environment with classification, prioritization, and response generation

entry_point: app:app

tasks:
  - name: easy
    description: Classify email into category
  - name: medium
    description: Classify email and assign priority
  - name: hard
    description: Full triage including response generation

observation_space:
  type: object
  properties:
    email_id:
      type: string
    subject:
      type: string
    body:
      type: string
    history:
      type: string

action_space:
  type: object
  properties:
    category:
      type: string
    priority:
      type: string
    response:
      type: string

reward:
  type: float
  min: 0.0
  max: 1.0